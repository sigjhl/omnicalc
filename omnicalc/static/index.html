<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniCalc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1>OmniCalc</h1>
                <span class="status-indicator ready" id="statusIndicator" title="System Ready"></span>
            </div>
            <div class="header-right">
                <button id="newSessionBtn" class="icon-btn" title="New Session">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 21v-5h5" />
                    </svg>
                </button>
                <button id="settingsBtn" class="icon-btn" title="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chat History -->
        <main class="chat-container" id="chatContainer">
            <div class="welcome-message" id="welcomeMessage">
                <div class="logo-large">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="2" width="16" height="20" rx="2" ry="2" />
                        <line x1="8" y1="6" x2="16" y2="6" />
                        <line x1="8" y1="10" x2="16" y2="10" />
                        <line x1="12" y1="14" x2="12" y2="18" />
                        <line x1="8" y1="14" x2="8" y2="14.01" />
                        <line x1="16" y1="14" x2="16" y2="14.01" />
                        <line x1="8" y1="18" x2="8" y2="18.01" />
                        <line x1="16" y1="18" x2="16" y2="18.01" />
                    </svg>
                </div>
                <h2>OmniCalc</h2>
                <p>Your clinical calculation assistant.<br />Describe a patient scenario to begin.</p>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-container">
            <div class="attachments-area" id="attachmentsArea" style="display:none;">
                <div class="attachment-chip">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span id="attachmentName">Attachment</span>
                    <button id="clearAttachmentBtn" class="clear-btn">&times;</button>
                </div>
            </div>

            <div class="input-row">
                <button id="recordBtn" class="action-btn circle-btn inactive" title="Voice Input (Cmd+R)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                    </svg>
                </button>
                <div class="textarea-wrapper">
                    <textarea id="textInput" class="chat-input" placeholder="Message OmniCalc..." rows="1"></textarea>
                </div>
                <button id="captureBtn" class="action-btn circle-btn inactive" title="Add Attachment (Cmd+Shift+X)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21.44 11.05L12.25 20.24a6 6 0 1 1-8.49-8.49l9.2-9.19a4 4 0 1 1 5.65 5.65L9.4 17.43a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                    </svg>
                </button>
                <button id="screenshotBtn" class="action-btn circle-btn inactive hidden" title="Capture Screen (Cmd+Shift+X)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="20" x2="16" y2="20"></line>
                        <line x1="12" y1="18" x2="12" y2="20"></line>
                    </svg>
                </button>
                <button id="sendBtn" class="action-btn circle-btn primary" title="Send (Cmd+Enter)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-backdrop hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="closeSettingsBtn" class="icon-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="modelSelect">LLM Model</label>
                    <div class="model-selector">
                        <select id="modelSelect" class="form-select" disabled>
                            <option>Loading models...</option>
                        </select>
                        <button id="refreshModelsBtn" class="icon-btn" title="Refresh Models">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M21 2v6h-6" />
                                <path d="M3 12a9 9 0 1 0 2.6-6.4L2 9" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label for="themeSelect">Theme</label>
                    <select id="themeSelect" class="form-select">
                        <option value="system">System Default</option>
                        <option value="dark">Dark Mode</option>
                        <option value="light">Light Mode</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label for="hotkeySelect">Send Message Hotkey</label>
                    <select id="hotkeySelect" class="form-select">
                        <option value="enter">Enter to Send, Shift+Enter for newline</option>
                        <option value="cmd_enter">Cmd/Ctrl+Enter to Send, Enter for newline</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label>Microphone (ASR) Hotkey</label>
                    <div style="display:flex; gap: 8px;">
                        <input type="text" id="asrHotkeyInput" class="form-select" readonly
                            placeholder="Click and press keys..." style="cursor: pointer; flex: 1; text-align: left;">
                        <button id="clearAsrHotkeyBtn" class="icon-btn" title="Clear Hotkey"
                            style="border: 1px solid var(--border-color); border-radius: 8px; padding: 0 12px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 6L6 18M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label id="captureHotkeyLabel">Attachment Picker Hotkey</label>
                    <div style="display:flex; gap: 8px;">
                        <input type="text" id="captureHotkeyInput" class="form-select" readonly
                            placeholder="Click and press keys..." style="cursor: pointer; flex: 1; text-align: left;">
                        <button id="clearCaptureHotkeyBtn" class="icon-btn" title="Clear Hotkey"
                            style="border: 1px solid var(--border-color); border-radius: 8px; padding: 0 12px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 6L6 18M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettingsBtn" class="primary-btn">Done</button>
            </div>
        </div>
    </div>

    <div id="attachPickerModal" class="modal-backdrop hidden">
        <div class="attach-sheet">
            <button id="pickFileBtn" class="attach-option-btn">Upload File</button>
            <button id="pickImageBtn" class="attach-option-btn">Upload Photo</button>
            <button id="pickCameraBtn" class="attach-option-btn">Use Camera</button>
            <button id="cancelAttachPickerBtn" class="attach-cancel-btn">Cancel</button>
        </div>
    </div>

    <div id="dragDropOverlay" class="drag-drop-overlay hidden" aria-hidden="true">
        <div class="drag-drop-panel">Drop file to attach</div>
    </div>

    <input id="attachFileInput" type="file" accept=".txt,.md,.csv,.tsv,.json,.yaml,.yml,.log,text/*,audio/*,image/*" class="hidden-file-input" hidden>
    <input id="attachImageInput" type="file" accept="image/*" class="hidden-file-input" hidden>
    <input id="attachCameraInput" type="file" accept="image/*" capture="environment" class="hidden-file-input" hidden>

    <script src="/static/app.js?v=13"></script>
</body>

</html>
